# Deploy — gestiona infra (Terraform) + imágenes (ECR) + rollout (ECS).
#
# Flujo:
#   1. Bootstrap del backend S3 (idempotente: crea bucket + tabla DynamoDB si no existen)
#   2. terraform init con backend remoto
#   3. terraform apply targeted a ECR (crea repos si no existen)
#   4. Build & push de imágenes con tag = github.sha
#   5. terraform apply completo con image_tag=github.sha
#      → Terraform detecta cambio en task definitions y rolloutea ECS solo
#   6. Espera a services-stable
#
# Si la infra no existe, la crea. Si existe, la actualiza. Idempotente.
#
# Requisitos (Settings → Secrets and variables → Actions):
#
#   Secrets:
#     AWS_ACCESS_KEY_ID
#     AWS_SECRET_ACCESS_KEY
#
#   Variables:
#     AWS_REGION         ej: us-east-1
#     TF_STATE_BUCKET    nombre globalmente único del bucket S3 para el state
#                        ej: test-nest-tfstate-<tu-account-id>

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_WORKING_DIR: terraform/option-b-ecs
  TF_STATE_KEY: test-nest/terraform.tfstate
  TF_LOCK_TABLE: test-nest-tflock

jobs:
  deploy:
    name: Provision & deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # -------------------------------------------------------------
      # 1. Bootstrap backend remoto: bucket S3 + tabla DynamoDB para lock.
      #    Es idempotente — si ya existen, no hace nada.
      # -------------------------------------------------------------
      - name: Bootstrap Terraform backend
        run: |
          set -euo pipefail
          REGION="${{ vars.AWS_REGION }}"
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          TABLE="${TF_LOCK_TABLE}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "→ Creando bucket $BUCKET"
            if [[ "$REGION" == "us-east-1" ]]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
          else
            echo "✔ Bucket $BUCKET ya existe"
          fi

          if ! aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" >/dev/null 2>&1; then
            echo "→ Creando tabla DynamoDB $TABLE"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION" >/dev/null
            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
          else
            echo "✔ Tabla $TABLE ya existe"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      # -------------------------------------------------------------
      # 2. Apply targeted: SOLO los repos ECR.
      #    Necesario para poder pushear imágenes antes de que ECS
      #    intente crearse y falle por imagen inexistente.
      # -------------------------------------------------------------
      - name: Terraform apply (ECR repos)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -target=aws_ecr_repository.orders \
            -target=aws_ecr_repository.notifications

      - name: Get ECR repository URLs
        id: ecr
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "orders=$(terraform output -raw ecr_orders_repository_url)" >> "$GITHUB_OUTPUT"
          echo "notifications=$(terraform output -raw ecr_notifications_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------
      # 3. Build & push con tag = github.sha (commit corto).
      #    También taggeamos 'latest' por conveniencia.
      # -------------------------------------------------------------
      - name: Build & push orders
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/orders/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.orders }}:${{ github.sha }}
            ${{ steps.ecr.outputs.orders }}:latest
          cache-from: type=gha,scope=orders
          cache-to: type=gha,mode=max,scope=orders

      - name: Build & push notifications
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/notifications/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.notifications }}:${{ github.sha }}
            ${{ steps.ecr.outputs.notifications }}:latest
          cache-from: type=gha,scope=notifications
          cache-to: type=gha,mode=max,scope=notifications

      # -------------------------------------------------------------
      # 4. Apply completo con image_tag=github.sha.
      #    - Si la infra no existe, la crea entera.
      #    - Si ya existe, Terraform diffea y actualiza solo lo que cambió.
      #    - El cambio en image_tag fuerza nueva task definition →
      #      ECS hace rolling deploy automáticamente.
      # -------------------------------------------------------------
      - name: Terraform apply (infra completa)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="image_tag=${{ github.sha }}" \
            -var="aws_region=${{ vars.AWS_REGION }}"

      - name: Wait for ECS services to stabilize
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          CLUSTER=$(terraform output -raw cluster_name)
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services orders notifications \
            --region "${{ vars.AWS_REGION }}"

      - name: Summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          ALB=$(terraform output -raw alb_dns_name)
          {
            echo "## Deploy completado"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **URL:** http://$ALB"
          } >> "$GITHUB_STEP_SUMMARY"
