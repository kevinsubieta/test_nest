# CI — corre en cada PR y push a main.
#
# Tiene 2 jobs corriendo en paralelo:
#   1. build       → lint + compila + tests
#   2. security    → escaneo de vulnerabilidades, secretos e IaC
#
# Ambos deben pasar antes de mergear a main.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Lint, build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build orders
        run: npm run build:orders

      - name: Build notifications
        run: npm run build:notifications

      - name: Test
        run: npm test -- --passWithNoTests

  # ---------------------------------------------------------------------------
  # Job de seguridad — DevSecOps "shift-left": en vez de descubrir problemas
  # en producción, los encontramos antes de mergear.
  #
  # 4 herramientas, cada una mira una capa distinta:
  #   - Gitleaks  → secretos commiteados (API keys, passwords, tokens)
  #   - npm audit → vulnerabilidades conocidas en dependencias
  #   - Trivy     → vulnerabilidades en filesystem + Dockerfiles (CVEs)
  #   - tfsec     → misconfiguraciones de Terraform (buckets públicos, etc.)
  # ---------------------------------------------------------------------------
  security:
    name: Security scans
    runs-on: ubuntu-latest

    # Necesario para que algunos scanners (Trivy/tfsec) puedan publicar
    # findings al "Security" tab de GitHub vía formato SARIF.
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Gitleaks necesita el historial completo para buscar secretos
          # en commits anteriores, no solo en el último.
          fetch-depth: 0

      # 1. Secretos en el repo (claves AWS, tokens, etc.).
      - name: Gitleaks — scan secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Vulnerabilidades en dependencias de npm.
      #    --audit-level=high → solo falla con high/critical; warnings no.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true  # didáctico: reportar sin bloquear el demo

      # 3. CVEs en filesystem + Dockerfiles.
      #    Trivy busca librerías con vulnerabilidades conocidas (CVE)
      #    en el código y en las imágenes base de los Dockerfiles.
      - name: Trivy — scan filesystem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '0'           # didáctico: no bloquea
          format: table

      # 4. Misconfiguraciones en Terraform (IaC security).
      #    Detecta cosas como: security groups abiertos al mundo,
      #    buckets S3 sin encryption, IAM roles demasiado permisivos.
      - name: tfsec — scan Terraform
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/option-b-ecs
          soft_fail: true          # didáctico: reporta sin romper el CI
