# AI Code Review con Claude — lo más trending en CI/CD 2026.
#
# Qué hace:
#   Cuando se abre o actualiza un Pull Request, Claude lee el diff y
#   deja comentarios inline sobre:
#     - bugs o errores lógicos
#     - problemas de seguridad
#     - oportunidades de simplificación
#     - inconsistencias con el resto del repo
#
# También se puede invocar manualmente comentando "@claude <pregunta>"
# en cualquier PR o issue.
#
# Requisitos (Settings → Secrets and variables → Actions → Secrets):
#   ANTHROPIC_API_KEY  → tu API key de https://console.anthropic.com/
#
# Por qué importa para el módulo:
#   Es el patrón "AI-augmented CI/CD" que se está volviendo standard.
#   Empresas como Vercel, Shopify y Cloudflare lo usan en producción.
#   El reviewer humano sigue siendo el que aprueba, pero Claude levanta
#   el 80% del trabajo mecánico (typos, edge cases, naming, etc.).

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude reviews this PR
    runs-on: ubuntu-latest

    # Permisos que la action necesita para:
    #   - leer el código del PR
    #   - dejar comentarios y reviews
    #   - leer el estado de los checks (para entender contexto)
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Modelo: Sonnet 4.6 es la mejor relación costo/calidad para reviews.
          # Para reviews muy críticos podés cambiar a claude-opus-4-8.
          # --allowedTools: le damos permiso explícito a las herramientas de review de GitHub
          # para que pueda dejar comentarios inline y submitear el review.
          claude_args: '--model claude-sonnet-4-6 --allowedTools "mcp__github__create_pending_pull_request_review,mcp__github__add_pull_request_review_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github_comment__update_claude_comment"'
          # Muestra el output completo en el log del step (útil para debugging).
          # Podés cambiarlo a false una vez que verifiques que funciona.
          show_full_output: true
          # Sticky comment: Claude edita un único comentario en vez de crear uno nuevo
          # cada vez que se re-corre el workflow. Más limpio para PRs con varios pushes.
          use_sticky_comment: true
          prompt: |
            Sos un reviewer experto de NestJS, Terraform y CI/CD.
            Revisá los cambios de este Pull Request y dejá **siempre**
            al menos un comentario general + comentarios inline sobre:

              1. Bugs reales o errores lógicos (comparaciones ==/!=, manejo de null, async mal usado).
              2. Problemas de seguridad (secretos hardcodeados, inputs sin validar, logs con datos sensibles, IAM/CORS abiertos).
              3. Inconsistencias con el resto del repo (naming, patrones, uso de DTOs, exceptions específicas).
              4. Simplificaciones y performance (loops innecesarios, código duplicado, N+1 queries).
              5. Diseño y arquitectura (uso de `any`, métodos HTTP incorrectos, endpoints sin autenticación adecuada).

            Reglas:
              - **Siempre dejá al menos un comentario resumen general en el PR**, aunque el linter ya haya marcado cosas.
              - Cubrí el ángulo SEMÁNTICO que el linter no puede ver (seguridad, arquitectura, patrones del repo).
              - Un comentario por hallazgo, conciso pero completo.
              - Respondé en español.
              - Al final, dejá un comentario general con el resumen de todos los hallazgos ordenados por severidad.
