# AI Code Review con Claude — lo más trending en CI/CD 2026.
#
# Qué hace:
#   Cuando se abre o actualiza un Pull Request, Claude lee el diff y
#   deja comentarios inline sobre:
#     - bugs o errores lógicos
#     - problemas de seguridad
#     - oportunidades de simplificación
#     - inconsistencias con el resto del repo
#
# También se puede invocar manualmente comentando "@claude <pregunta>"
# en cualquier PR o issue.
#
# Requisitos (Settings → Secrets and variables → Actions → Secrets):
#   ANTHROPIC_API_KEY  → tu API key de https://console.anthropic.com/
#
# Por qué importa para el módulo:
#   Es el patrón "AI-augmented CI/CD" que se está volviendo standard.
#   Empresas como Vercel, Shopify y Cloudflare lo usan en producción.
#   El reviewer humano sigue siendo el que aprueba, pero Claude levanta
#   el 80% del trabajo mecánico (typos, edge cases, naming, etc.).

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude reviews this PR
    runs-on: ubuntu-latest

    # Permisos que la action necesita para:
    #   - leer el código del PR
    #   - dejar comentarios y reviews
    #   - leer el estado de los checks (para entender contexto)
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Modelo: Sonnet 4.6 es la mejor relación costo/calidad para reviews.
          # Para reviews muy críticos podés cambiar a claude-opus-4-8.
          # --allowedTools: le damos permiso explícito a las herramientas de review de GitHub
          # para que pueda dejar comentarios inline y submitear el review.
          claude_args: '--model claude-sonnet-4-6'
          # Muestra el output completo en el log del step (útil para debugging).
          # Podés cambiarlo a false una vez que verifiques que funciona.
          show_full_output: true
          # Sticky comment: Claude edita un único comentario en vez de crear uno nuevo
          # cada vez que se re-corre el workflow. Más limpio para PRs con varios pushes.
          use_sticky_comment: true
          prompt: |
            IMPORTANTE: NO uses ningún slash command ni skill (nada de /review, /code-review, /security-review).
            NO llames a `gh pr list` ni intentes listar PRs. Ya estás dentro del contexto del PR correcto.

            Tu tarea:
            1. Leé los archivos del working directory (ya están checkouteados en la branch del PR).
            2. Compará contra la branch base usando `git diff origin/main...HEAD` para ver qué cambió.
            3. Revisá los cambios buscando:
               - Bugs (comparaciones ==/!=, manejo de null, async mal usado, `any` en TypeScript)
               - Seguridad (secretos hardcodeados, inputs sin validar, logs con datos sensibles)
               - Inconsistencias con el resto del repo (naming, uso de DTOs, exceptions)
               - Simplificaciones (loops innecesarios, código duplicado, N+1 queries)
               - Arquitectura (métodos HTTP incorrectos, endpoints sin auth adecuada)
            4. Publicá UN comentario general en el PR con tus hallazgos ordenados por severidad,
               en español, conciso y directo.

            Contexto del proyecto:
            - Monorepo NestJS con microservicios (orders, notifications) comunicándose por NATS
            - Infraestructura en AWS ECS Fargate definida en Terraform
            - CI/CD con GitHub Actions

      # -------------------------------------------------------------------
      # Fallback: si Claude generó un review pero no logró postearlo,
      # extraemos el resultado del JSON de output y lo posteamos como
      # comentario en el PR usando el GITHUB_TOKEN (que sí tiene permisos).
      # -------------------------------------------------------------------
      - name: Post Claude review as PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          OUTPUT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "No hay output de Claude para postear."
            exit 0
          fi

          # El JSON de Claude es un array de eventos de streaming.
          # Buscamos el evento con type=="result" y extraemos su campo .result.
          # Usamos `..` para caminar todo el JSON por si el shape cambia.
          REVIEW=$(jq -r '[.. | objects | select(.type? == "result") | .result] | last // empty' "$OUTPUT_FILE")

          if [ -z "$REVIEW" ]; then
            echo "Claude no devolvió un review."
            exit 0
          fi

          # Guardar el review en un archivo para pasarlo con --body-file
          # (--body directo puede fallar con textos largos)
          echo "## 🤖 Review automático por Claude" > /tmp/review.md
          echo "" >> /tmp/review.md
          echo "$REVIEW" >> /tmp/review.md
          echo "" >> /tmp/review.md
          echo "---" >> /tmp/review.md
          echo "_Generado por [Claude Code Action](https://github.com/anthropics/claude-code-action) — modelo: claude-sonnet-4-6_" >> /tmp/review.md

          gh pr comment "$PR_NUMBER" --body-file /tmp/review.md
          echo "✔ Review posteado al PR #$PR_NUMBER"
